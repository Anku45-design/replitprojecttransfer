kind = "web"
previewPath = "/"
title = "Flood Risk Platform"
version = "1.0.0"
id = "artifacts/flood-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21935
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/flood-platform run dev"

[services.env]
PORT = "21935"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/flood-platform", "run", "build"]
publicDir = "artifacts/flood-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
